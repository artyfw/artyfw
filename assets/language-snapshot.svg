<svg width="760" height="270" viewBox="0 0 760 270" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Language Snapshot</title>
  <desc id="desc">A stable visual snapshot of the languages and stack used by Arty.</desc>
  <rect width="760" height="270" rx="14" fill="#0D1117"/>
  <rect x="0.5" y="0.5" width="759" height="269" rx="13.5" stroke="#30363D"/>

  <text x="32" y="46" fill="#F0F6FC" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="24" font-weight="700">Language Snapshot</text>
  <text x="32" y="74" fill="#8B949E" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="14">A clean overview of the stack I work with most right now.</text>

  <rect x="32" y="104" width="696" height="18" rx="9" fill="#161B22"/>
  <rect x="32" y="104" width="286" height="18" rx="9" fill="#3178C6"/>
  <rect x="318" y="104" width="190" height="18" fill="#F7DF1E"/>
  <rect x="508" y="104" width="128" height="18" fill="#3776AB"/>
  <rect x="636" y="104" width="92" height="18" rx="9" fill="#E34F26"/>

  <g font-family="Segoe UI, Inter, Arial, sans-serif" font-size="15">
    <circle cx="42" cy="154" r="6" fill="#3178C6"/>
    <text x="58" y="159" fill="#F0F6FC" font-weight="600">TypeScript</text>
    <text x="166" y="159" fill="#8B949E">primary for structured web apps</text>

    <circle cx="42" cy="188" r="6" fill="#F7DF1E"/>
    <text x="58" y="193" fill="#F0F6FC" font-weight="600">JavaScript</text>
    <text x="166" y="193" fill="#8B949E">frontend logic, tooling, and experiments</text>

    <circle cx="390" cy="154" r="6" fill="#3776AB"/>
    <text x="406" y="159" fill="#F0F6FC" font-weight="600">Python</text>
    <text x="476" y="159" fill="#8B949E">automation and practical scripts</text>

    <circle cx="390" cy="188" r="6" fill="#E34F26"/>
    <text x="406" y="193" fill="#F0F6FC" font-weight="600">HTML/CSS</text>
    <text x="490" y="193" fill="#8B949E">interfaces, layout, and polish</text>
  </g>

  <rect x="32" y="224" width="696" height="1" fill="#30363D"/>
  <text x="32" y="247" fill="#8B949E" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="13">Kept local in this repository so the profile stays clean even when external stat services fail.</text>
</svg>
