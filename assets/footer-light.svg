<svg width="1200" height="110" viewBox="0 0 1200 110" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .tag { font: 500 15px 'Cascadia Code', 'Fira Code', Consolas, monospace; fill: #64748B; }
    .pulse { animation: pulse 3s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
  </style>
  <defs>
    <linearGradient id="f" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0284C7"/>
      <stop offset="0.5" stop-color="#4F46E5"/>
      <stop offset="1" stop-color="#9333EA"/>
    </linearGradient>
    <clipPath id="ff">
      <rect width="1200" height="110" rx="14"/>
    </clipPath>
  </defs>
  <g clip-path="url(#ff)">
    <rect width="1200" height="110" fill="#FFFFFF"/>
    <rect x="0.5" y="0.5" width="1199" height="109" rx="13.5" stroke="#E2E8F0" fill="none"/>
    <rect class="pulse" y="0" width="1200" height="3" fill="url(#f)"/>
    <text class="tag" x="600" y="52" text-anchor="middle">// designed &#38; built by hand &#8212; no template</text>
    <text class="tag" x="600" y="80" text-anchor="middle" fill="#0284C7">github.com/artyfw</text>
  </g>
</svg>
